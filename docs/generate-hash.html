<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generate Password Hash — YT Digest</title>
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: 4rem auto; padding: 1rem; background: #0f0f0f; color: #e8e8e8; }
    h1 { font-size: 1.2rem; margin-bottom: 0.5rem; }
    p { color: #888; font-size: 0.9rem; margin-bottom: 1.2rem; }
    input { width: 100%; padding: 0.6rem 0.8rem; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; color: #e8e8e8; font-size: 1rem; margin-bottom: 0.75rem; }
    button { padding: 0.6rem 1.4rem; background: #ff4444; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; }
    #result { margin-top: 1.2rem; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; padding: 0.8rem; word-break: break-all; font-family: monospace; font-size: 0.85rem; display: none; }
    label { font-size: 0.8rem; color: #888; display: block; margin-bottom: 0.3rem; }
  </style>
</head>
<body>
  <h1>Password Hash Generator</h1>
  <p>Enter your chosen password below to get the SHA-256 hash. Copy the hash and store it as the <strong>SITE_PASSWORD_HASH</strong> GitHub Secret.</p>
  <input id="pw" type="password" placeholder="Your password" />
  <button onclick="generate()">Generate Hash</button>
  <div id="result">
    <label>SHA-256 Hash (copy this to GitHub Secrets):</label>
    <span id="hash-output"></span>
  </div>
  <script>
    async function generate() {
      const pw = document.getElementById("pw").value;
      if (!pw) return;
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pw));
      const hash = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
      document.getElementById("hash-output").textContent = hash;
      document.getElementById("result").style.display = "block";
    }
    document.getElementById("pw").addEventListener("keydown", e => { if (e.key === "Enter") generate(); });
  </script>
</body>
</html>
