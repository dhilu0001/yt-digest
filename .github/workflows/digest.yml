name: YT Digest

on:
  schedule:
    - cron: "0 6 * * *"   # 6 AM UTC daily
  workflow_dispatch:       # also allow manual runs

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Run digest
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CHANNELS: ${{ vars.CHANNELS || '@NateBJones' }}
          MAX_VIDEOS_PER_RUN: "5"
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
        run: uv run python scripts/fetch_and_summarize.py

      - name: Generate monthly summaries
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
        run: uv run python scripts/generate_monthly_summaries.py

      - name: Write site config
        env:
          SITE_PASSWORD_HASH: ${{ secrets.SITE_PASSWORD_HASH }}
        run: |
          python3 -c "
          import json, os
          from datetime import datetime, timezone
          config = {
              'passwordHash': os.environ.get('SITE_PASSWORD_HASH', ''),
              'updatedAt': datetime.now(timezone.utc).isoformat()
          }
          with open('docs/config.json', 'w') as f:
              json.dump(config, f)
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "digest: update $(date -u +%Y-%m-%d)"
          git push
